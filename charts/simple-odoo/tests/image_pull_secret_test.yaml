suite: image pull secret tests
templates:
  - deployment.yaml
tests:
  - it: should use generated image pull secret when credentials are provided and existingSecret is not set
    set:
      imagePullSecret.server: "registry.example.com"
      imagePullSecret.user: "test-user"
      imagePullSecret.password: "test-pass"
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: "59640066b8772602-RELEASE-NAME"
