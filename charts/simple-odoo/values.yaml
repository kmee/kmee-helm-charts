replicaCount: 1

image:
  repository: docker.io/library/odoo
  tag: "17.0"
  imagePullPolicy: IfNotPresent

updateStrategy:
  type: Recreate

autoRollout:
  enabled: true

nodeSelector:
  enabled: false
  labelname: "kubernetes.io/hostname"
  labelvalue: "node-hostname"

podAnnotations:
  ## change this number to redeploy application
  redeployAt: "20251029-123456"

### -> https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
performanceLimit:
  enabled: true
  memory:
    request: "512Mi"
    max: "1024Mi"
  cpuTime:
    request: "200m"
    max: "1"

imagePullSecret:
  # Use existing secret
  existingSecret: "secret-name-to-use"
  # OR provide credentials to generate one
  # server: "registry.chart.example"
  # user: "user-chart-example"
  # password: "3e9aafc8-429d-4450-a99f-1cba4adcbeac"

### environment
config:
  # ENV_0: "value_0"
  # ENV_1: "value_1"
  # ENV_2: "value_2"
  # ENV_3: "value_3"
  # ENV_4: "value_4"
  # ENV_5: "value_5"
  # ENV_6: "value_6"
  # ENV_7: "value_7"
  # ENV_8: "value_8"
  # ENV_9: "value_9"

ingress:
  enabled: true
  className: "nginx"
  wwwNginxRedirect: true
  recommendedNginxSettings: true
  tls:
    enabled: true
  domains:
    - url: "domain1.com"
      secretName: domain1-cert-tls-secret
    - url: "domain2.com"
      # secretName: null = auto-generate-name
    - url: "domain3.com"
      secretName: domain3-cert-tls-secret

  ports:
    # /websocket to odoo >= 16 or /longpolling
    - path: "/websocket"
      name: "secondary"
      number: 8072
    - path: "/"
      name: "web"
      number: 8069
  # - path: "/api"
  #  name: "apiexpose"
  #  number: 4000
  ingressAnnotations: {}

persistence:
  enabled: false
  initVolume: false
  ### k3s -> https://github.com/rancher/local-path-provisioner
  storageClass: "local-path"
  accessMode: ReadWriteOnce
  size: 1Gi

customStartScript:
  enabled: false
  ### or /bin/bash ; or /usr/local/bin/python ...
  command: /bin/sh
  script: |
    #!/bin/sh
    set -x
    command_1 &&
    command_2 &&
    command_3 &&
    command_4 &&
    command_5 &&
    command_6 &&
    /default/image/entrypoint || echo 'custom entrypoint script not work, sleeping ...' ;  sleep infinity

## full kubernetes yaml (support expand values)
extraK8sYaml: {}
