name: Release Candidate Charts

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  rc-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: List changed charts
        id: list-changed
        shell: bash
        run: |
          changed="$(ct list-changed --target-branch "${{ github.event.pull_request.base.ref }}")"
          echo "changed<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Prepare packaged charts
        if: steps.list-changed.outputs.changed != ''
        shell: bash
        run: |
          mkdir -p .cr-release-packages

          for chart in ${{ steps.list-changed.outputs.changed }}; do
            chart_yaml="$chart/Chart.yaml"

            name="$(grep '^name:' "$chart_yaml" | awk '{print $2}')"
            version="$(grep '^version:' "$chart_yaml" | awk '{print $2}')"

            rc_version="${version}-rc.${{ github.event.pull_request.number }}"

            echo "Packaging $name with version $rc_version"

            helm dependency update "$chart" || true

            helm package "$chart" \
              --destination .cr-release-packages \
              --version "$rc_version"
          done

      - name: Upload RC charts to GitHub Releases / Pages index
        if: steps.list-changed.outputs.changed != ''
        uses: helm/chart-releaser-action@v1.7.0
        with:
          skip_packaging: true
          packages_with_index: .cr-release-packages
          mark_as_latest: false
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
